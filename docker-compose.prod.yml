# ============================================
# Docker Compose — Produção
# ============================================
# Uso: docker compose -f docker-compose.prod.yml up -d --build
# ============================================

services:
  # ---------- Banco de Dados ----------
  postgres:
    image: postgres:16-alpine
    container_name: encomendas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Cache ----------
  redis:
    image: redis:7-alpine
    container_name: encomendas_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- API (NestJS) ----------
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: encomendas_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      MASTER_EMAIL: ${MASTER_EMAIL}
      MASTER_PASSWORD: ${MASTER_PASSWORD}
      WHATSAPP_API_URL: ${WHATSAPP_API_URL}
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN}
      CORS_ORIGIN: ${CORS_ORIGIN}
      API_PORT: 3001
    volumes:
      - api_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------- Frontend (Next.js) ----------
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        API_INTERNAL_URL: http://api:3001
    container_name: encomendas_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:3001
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

  # ---------- Nginx (Reverse Proxy) ----------
  nginx:
    image: nginx:alpine
    container_name: encomendas_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_etc:/etc/letsencrypt:ro
      - certbot_var:/var/lib/letsencrypt
      - certbot_webroot:/var/www/certbot
    depends_on:
      - api
      - web
    networks:
      - internal

  # ---------- Certbot (SSL) ----------
  certbot:
    image: certbot/certbot
    container_name: encomendas_certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done'"

volumes:
  postgres_data:
  redis_data:
  api_uploads:
  certbot_etc:
  certbot_var:
  certbot_webroot:

networks:
  internal:
    driver: bridge
