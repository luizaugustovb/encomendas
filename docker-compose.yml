services:
  postgres:
    image: postgres:16-alpine
    container_name: encomendas_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: encomendas
      POSTGRES_PASSWORD: encomendas123
      POSTGRES_DB: encomendas_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: encomendas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
